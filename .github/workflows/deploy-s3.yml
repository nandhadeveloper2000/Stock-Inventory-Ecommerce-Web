name: Deploy Website to Amazon S3

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-stock-inventory-website
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Verify production API URL
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ vars.NEXT_PUBLIC_API_BASE_URL }}
        run: |
          if [ -z "$NEXT_PUBLIC_API_BASE_URL" ]; then
            echo "ERROR: NEXT_PUBLIC_API_BASE_URL GitHub variable is empty."
            exit 1
          fi

          echo "API URL configured successfully."

      - name: Build static Next.js website
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ vars.NEXT_PUBLIC_API_BASE_URL }}
        run: npm run build

      - name: Verify required static pages
        run: |
          echo "Checking exported static files..."

          REQUIRED_FILES=(
            "out/index.html"
            "out/login/index.html"
            "out/seller/index.html"
            "out/master/index.html"
          )

          for FILE in "${REQUIRED_FILES[@]}"; do
            if [ ! -f "$FILE" ]; then
              echo "ERROR: Missing static page: $FILE"
              echo ""
              echo "Generated HTML files found:"
              find out -type f -name "index.html" | sort
              exit 1
            fi

            echo "OK: $FILE"
          done

      - name: Configure AWS credentials through OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Upload website to Amazon S3
        run: |
          aws s3 sync ./out s3://${{ vars.S3_BUCKET }} --delete

      - name: Invalidate CloudFront cache
        env:
          CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          if [ -z "$CLOUDFRONT_DISTRIBUTION_ID" ]; then
            echo "ERROR: CLOUDFRONT_DISTRIBUTION_ID GitHub variable is empty."
            exit 1
          fi

          aws cloudfront create-invalidation \
            --distribution-id "$CLOUDFRONT_DISTRIBUTION_ID" \
            --paths "/*"

      - name: Deployment completed
        run: |
          echo "Website deployed successfully to S3."
          echo "CloudFront invalidation requested."
